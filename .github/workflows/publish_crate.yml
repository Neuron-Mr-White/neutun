name: Publish to crates.io
on:
  push:
    tags:
      - "v*"

  workflow_dispatch:

jobs:
  publish:
    runs-on: ubuntu-latest
    env:
      CARGO_REGISTRY_TOKEN: ${{ secrets.CARGO_REGISTRY_TOKEN }}

    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable

      - name: Publish neutun_lib
        run: |
          echo "::group::Publishing neutun_lib"
          output=$(cargo publish -p neutun_lib 2>&1) || {
            if echo "$output" | grep -q "already exists"; then
              echo "neutun_lib version already published, skipping."
            else
              echo "$output"
              echo "::error::Failed to publish neutun_lib. Check that CARGO_REGISTRY_TOKEN is valid."
              exit 1
            fi
          }
          echo "$output"
          echo "::endgroup::"

      - name: Wait for crates.io index update
        run: sleep 30

      - name: Publish neutun
        run: |
          echo "::group::Publishing neutun"
          output=$(cargo publish -p neutun 2>&1) || {
            if echo "$output" | grep -q "already exists"; then
              echo "neutun version already published, skipping."
            else
              echo "$output"
              echo "::error::Failed to publish neutun. The crates.io index may not have updated yet."
              exit 1
            fi
          }
          echo "$output"
          echo "::endgroup::"
