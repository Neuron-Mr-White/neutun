name: Publish to crates.io
on:
  push:
    tags:
      - "v*"

  workflow_dispatch:

jobs:
  publish:
    runs-on: ubuntu-latest
    env:
      CARGO_REGISTRY_TOKEN: ${{ secrets.CARGO_REGISTRY_TOKEN }}

    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable

      - name: Publish neutun_lib
        run: |
          echo "::group::Publishing neutun_lib"
          cargo publish -p neutun_lib || {
            echo "::error::Failed to publish neutun_lib. Check that CARGO_REGISTRY_TOKEN is valid."
            exit 1
          }
          echo "::endgroup::"

      - name: Wait for crates.io index update
        run: sleep 30

      - name: Publish neutun
        run: |
          echo "::group::Publishing neutun"
          cargo publish -p neutun || {
            echo "::error::Failed to publish neutun. The crates.io index may not have updated yet."
            exit 1
          }
          echo "::endgroup::"
